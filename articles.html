<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg:#0f0e0c;
  --surface:#1a1816;
  --surface-2:#211f1b;
  --border:#2e2a25;
  --border-light:#3a352e;
  --text:#e0d8cb;
  --text-2:#a89e8e;
  --text-3:#6e6358;
  --warm:#d4976a;
  --warm-dim:#a07050;
  --warm-soft:rgba(212,151,106,0.08);
}

html{background:var(--bg);scroll-behavior:smooth}
body{font-family:'Noto Sans SC',system-ui,sans-serif;color:var(--text);-webkit-font-smoothing:antialiased;overflow-x:hidden}

/* NAV */
.float-nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  padding:14px 28px;
  display:flex;justify-content:space-between;align-items:center;
  background:rgba(15,14,12,0.88);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  transform:translateY(-100%);opacity:0;
  transition:transform .4s cubic-bezier(.22,1,.36,1),opacity .4s;
  pointer-events:none;
}
.float-nav.visible{transform:none;opacity:1;pointer-events:auto}
.float-nav .fn-logo{font-family:'Ma Shan Zheng',cursive;font-size:18px;color:var(--warm);text-decoration:none}
.float-nav .fn-links{display:flex;gap:20px}
.float-nav .fn-links a{font-size:12.5px;color:var(--text-3);text-decoration:none;letter-spacing:.03em;transition:color .2s}
.float-nav .fn-links a:hover{color:var(--text)}
.float-nav .fn-links a.current{color:var(--warm)}

/* HERO */
.hero{
  padding:100px 32px 64px;
  max-width:760px;margin:0 auto;
}
.hero-tag{
  font-size:11px;letter-spacing:.15em;text-transform:uppercase;
  color:var(--warm);margin-bottom:20px;
  opacity:0;animation:fadeIn .6s .1s both;
}
.hero h1{
  font-family:'ZCOOL XiaoWei',serif;
  font-size:clamp(32px,5.5vw,48px);font-weight:400;
  line-height:1.35;margin-bottom:16px;
  opacity:0;animation:fadeIn .6s .2s both;
}
.hero-desc{
  font-size:clamp(14px,1.6vw,15.5px);color:var(--text-2);
  line-height:1.9;max-width:520px;
  opacity:0;animation:fadeIn .6s .35s both;
}

/* FILTERS */
.filter-bar{
  max-width:760px;margin:0 auto;
  padding:32px 32px 40px;
  display:flex;gap:8px;flex-wrap:wrap;
  opacity:0;animation:fadeIn .6s .5s both;
}
.filter-btn{
  padding:7px 18px;font-size:12.5px;font-family:inherit;
  color:var(--text-3);background:transparent;
  border:1px solid var(--border);border-radius:100px;
  cursor:pointer;transition:all .25s;
}
.filter-btn:hover{color:var(--text-2);border-color:var(--border-light)}
.filter-btn.active{color:var(--warm);border-color:var(--warm-dim);background:var(--warm-soft)}

/* ARTICLE LIST — 单列，杂志感 */
.articles{
  max-width:760px;margin:0 auto;
  padding:0 32px 100px;
  display:flex;flex-direction:column;gap:1px;
}

.article-item{
  display:grid;
  grid-template-columns:1fr auto;
  align-items:baseline;
  gap:16px;
  padding:24px 0;
  border-bottom:1px solid var(--border);
  cursor:pointer;
  transition:all .25s;
  opacity:0;transform:translateY(12px);
}
.article-item.visible{
  opacity:1;transform:none;
  transition:opacity .4s cubic-bezier(.22,1,.36,1),transform .4s cubic-bezier(.22,1,.36,1),background .2s;
}
.article-item:hover{padding-left:12px}
.article-item:hover .item-title{color:var(--warm)}

.item-cat{
  font-size:11px;letter-spacing:.06em;
  color:var(--warm-dim);margin-bottom:6px;
}
.item-title{
  font-family:'Noto Serif SC',serif;
  font-size:17px;font-weight:600;line-height:1.6;
  transition:color .2s;
}
.item-preview{
  font-size:13px;color:var(--text-3);line-height:1.7;
  margin-top:6px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.item-meta{
  font-size:12px;color:var(--text-3);
  white-space:nowrap;
  font-variant-numeric:tabular-nums;
}
.item-arrow{
  display:inline-block;margin-left:6px;
  opacity:0;transform:translateX(-4px);
  transition:all .25s;
}
.article-item:hover .item-arrow{opacity:1;transform:none}

/* READER */
.reader-overlay{
  position:fixed;inset:0;z-index:200;
  background:rgba(10,9,7,0.94);backdrop-filter:blur(24px);
  opacity:0;pointer-events:none;transition:opacity .3s;
  overflow-y:auto;-webkit-overflow-scrolling:touch;
}
.reader-overlay.open{opacity:1;pointer-events:auto}

.reader-close{
  position:fixed;top:20px;right:28px;z-index:210;
  width:36px;height:36px;
  background:var(--surface);border:1px solid var(--border);border-radius:50%;
  color:var(--text-2);font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .2s;
}
.reader-close:hover{color:var(--warm);border-color:var(--warm-dim)}

.reader-content{
  max-width:640px;margin:72px auto 120px;padding:0 32px;
  opacity:0;transform:translateY(20px);
  transition:all .35s .08s cubic-bezier(.22,1,.36,1);
}
.reader-overlay.open .reader-content{opacity:1;transform:none}

.reader-cat{font-size:11px;letter-spacing:.12em;color:var(--warm);margin-bottom:16px}
.reader-title{
  font-family:'ZCOOL XiaoWei',serif;
  font-size:clamp(26px,4.5vw,36px);font-weight:400;
  line-height:1.4;margin-bottom:28px;
}
.reader-divider{width:32px;height:1px;background:var(--warm-dim);margin-bottom:36px}
.reader-body{
  font-family:'Noto Serif SC',serif;
  font-size:clamp(15px,1.5vw,16.5px);line-height:2;color:var(--text-2);
}
.reader-body p{margin-bottom:1.4em;text-align:justify}
.reader-body p:first-child::first-letter{
  font-size:2.2em;float:left;line-height:1;
  margin:4px 10px 0 0;color:var(--warm);
  font-family:'ZCOOL XiaoWei',serif;
}

/* FOOTER */
.site-footer{
  text-align:center;padding:48px 32px 64px;
  border-top:1px solid var(--border);
}
.site-footer p{font-size:12.5px;color:var(--text-3);line-height:2}
.site-footer a{color:var(--warm-dim);text-decoration:none}
.site-footer a:hover{color:var(--warm)}

@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

@media(max-width:640px){
  .float-nav{padding:10px 16px}
  .float-nav .fn-links{gap:14px}
  .float-nav .fn-links a{font-size:11.5px}
  .hero{padding:110px 20px 48px}
  .filter-bar{padding:24px 20px 32px}
  .articles{padding:0 20px 80px}
  .article-item{grid-template-columns:1fr;gap:4px}
  .item-meta{margin-top:4px}
  .reader-content{margin:56px auto 100px;padding:0 20px}
  .reader-close{top:14px;right:14px}
}
</style>
</head>

<script>
const ARTICLES = [{"id": "二十三", "title": "二十三", "cat": "personal", "catLabel": "个人感悟", "preview": "五年没有在家里过生日了，终于终于能回家里过一次生日...", "text": "二十三\n\n二十三岁\n\n五年没有在家里过生日了，终于终于能回家里过一次生日\n\n又是一年时间飞逝，只是觉得这一年过得很漫长，认识了很多人，聊了很多天，又有了很多新的认知，总结下来，分享给大家。\n\n这一年的主题可能更多是留学生活（虽然好像在海外一共就呆了七个多月。。），但我想先谈谈之前的四年。\n\n时间的积累还需要时间来验证，刚出来的时候也不知道为什么这么想念成都，过了一年之后再次重新品味，就发现好像四年里已经深深融入这座城市，一部分青春和灵魂永远留在这里。在塑造世界观和价值观的四年里能够一定程度上打破茧房，看到不同样的环境。如果一直生活在同一个地方，似乎能够观察到的东西总是局限的，在这我能看到一种松弛的人生。我会将这四年和我人生前十八年对我的影响做一个约等于号，让我原本单一的价值观有了很多的拓展。这四年是我人生最开心的四年，现在是，大概率以后也是。乐天的情绪，巴适的心态，好吃的饭菜，让我对于生活有了新的认识。未来希望是有生活有工作，而非过着工作盖过生活，生活屈服于工作的日子。感谢这四年我能看到什么叫做生活。\n\n出来之后回头看过往的成长环境，置身事外更能发现国内环境的特点。最让我有着深刻感受的就是庞大人口基数所带来的集体智慧，更准确的来说是一种信息冗余程度及垂直程度。当我们抛出一个问题的时候，总能听到人群之中的回声。这个人群可能是同学朋友，也有可能是素未谋面的网友，集体的力量让我们不会是被螃蟹夹的第一个人。就算再小众的选择、再冷门的经历，几乎都能找到已经走过一程，并愿意留下经验的过来人。再偏门的选择，也能在中文互联网找到同路的人。再难到达的地球角落，也必定留有中国游客分享的旅行攻略。“人多力量大”的语境无疑是在这些时刻被群体所具象化，这些无穷无尽的民间智慧，撑起了一个无比丰富的的社会支持网络，也为身处其中的彼此，搭建起有迹可循的安全感--“我们永远不会是第一个遇见这个难题的人”。也就是这些热气腾腾的人生，塑造出中国社会的烟火味。\n\n留学这一年看到了很多不一样的社会生活状态，也听到了很多不同的声音，涨了很多见识，学习到了很多新的看法，虽然很多看法我都不认为是正确的，但取其精华去其糟粕，在不同利益角度分析问题是很有意义的一件事。之前总是对外面的世界有一定滤镜。出来之后真正体验了才发现，每个国家都有自己的特点，对于同种事物持有着截然不同的看法。广大人民群众的朴素的追求美好生活愿景总是统一的，但不同的意识形态之间会进行斗争，越来越明白求同存异这个词语的伟大之处。。。海外生活工作有很多不一样，能多出来转转看看也总归是很好的。也有很多香蕉人端起碗筷吃饭，放下碗筷骂娘，见不得在国内的人比自己过得好的人。香蕉人对于白人的表面热情和情绪价值没学到，傲慢虚伪扣帽子倒是学的一套又一套。表面热情和情绪价值就是废话掺杂着无聊的经历再加上夸张的表情和反应然后一遍遍讲，讲完了换个人再来一遍。傲慢虚伪扣帽子就是不愿谦虚学习，只知道用自己那套叙事和角度看待问题，表面倡导平等包容，实际践行双重标准。有意见冲突就开始要上升高度给对方扣帽子了。\n\n这一年来，自己最大的进步是能稍微构建一个多角度的独立思考系统去看待问题。\n\n所有人看待问题的角度都会存在偏见和局限性。能从眼前对话的人的角度去看待问题都不算是一件很容易的事情。很幸运朋友们和我讲，很多时候喜欢和我探讨问题的原因之一是觉得我看问题的角度比较多。或许是我更喜欢从利益的角度出发，再用情感的方式表达。能感受到别人的难处，感受不到别人的难过，看待事物客观的有点可怕，好像没有什么感情似的。可能是这份置身事外让我能在不同的角度观察不同的人，不同的事，从而给出富有我个人色彩的理解的观点，这些观点让朋友们觉得这些难题原来还有这样把式的解法，从另外一个角度看这些难题似乎并非难以是解决的问题。也还在学习尽可能的全面，多角度的看待事情的出生，发展，鼎盛，衰弱，死亡。完整，平静的对待不同的问题。独立思考也是一件顶顶重要的事情。建立一套自己的逻辑体系，不被言论和舆论裹挟。学习周围有益的信息，但不被朋友同学的选择影响，换句话说即：别人得到的不是我所失去的。甚至很多时候父母不懂也不太需要考虑他们的想法，要独立自主地分析利弊关系，不盲从，一定要选择对自己利益最好的选择。唯有独立思考才能支撑起自我的利益分析从而塑造独立人格，以独立人格来探索想要走的路。\n\n这一年还读了很多书，看了很多新中国伟人选集和人物传记。从教员的书籍中，学习到了论持久战，干中学。 在周总理的传记中学到，做事不务虚，做领导的也要坚持做一线的工作，不能和人民群众脱离。 在小平同志身上学到实践的重要性，多实践，少空想。看完同志们的选集和传记之后，他们的经历从多个方面解开了我对于人生的迷茫和迷惑。要辩证的看待问题，很多事情不是非黑即白的。。。不同利益方会对事情做出不同侧面的感知和解释，所以可能对一件事情下定义之前，会各方面想想吧。争取让自己做一个多方面思考的人，而不是张口就来“不就是”句式的人，避免复杂问题简单化。有一段时间是认为生活很空虚乏味，无法说服自己通过已体验的工作内容去实现社会价值感，翻看这些书籍以及结合自己的见闻思考之后发现，一部分虚无感是来自无法找到全局最优解来快速做到自己想做的事情。但人是无法通过想象来取得最优解，只能通过实践找到局部最优解，这些局部综合起来才是我能做到的全局最优，或许还是做的太少想得太多，可以把更多一点的精力投入到做事情当中。根据已有的现实来推进，先实践后调整，不断推进可以做的事情，现在做的越好，能实现的可能性才越多。实践也是一个变化的过程，努力推进已有的现实发展，很多问题都会迎刃而解。或许专注现实，不空泛的想象的那条路才是最优解。最后还有一句话想送给大家：我劝同志们读一点书，免得受知识分子的骗。。。\n\n渐渐发现成绩好只是意味着成绩好，并不完全代表成绩好的人具有完备的人格，不代表有着风趣幽默有内涵的谈吐，也不代表着有人格魅力。成绩，泛指一切量化的指标，都不是定义人的关键因素。与之相比，我是一个非常喜欢和别人聊天的人，特别是对事物有独特想法的人，我更喜欢讨论天南海北，人生的意义，男女平权，聊八卦，谈现实和理想，利益和感情，聊聊自己是个怎么样的人，想要做一个怎么样的人，实现什么样的社会价值。人生很大，要做很多事，要见很多人来扩展自己的视野，才能发现自己想要的和想要做的是什么。\n\n始终觉得工作生活并不是零和博弈，不是说我进步一名一定会有人退步一名，实际上我还是认为社交网络是正和博弈，是共赢的而非竞争性的。只希望明年开始工作之后自己还会是一个对于生活感情充沛，始终有细腻温柔感情的人，，不要变得麻木。。。\n\n或许接下来一年我还想了解一下人生的意义是什么。。。", "charCount": 2762}, {"id": "二十二", "title": "二十二", "cat": "personal", "catLabel": "个人感悟", "preview": "不知道是不是太幸福的原因，二十二这一年过得额外的快。...", "text": "二十二\n\n二十二，新的一岁\n\n不知道是不是太幸福的原因，二十二这一年过得额外的快。\n\n所谓鲜衣怒马少年时。但外表光鲜之下每个人都有自己的迷茫，焦虑以及不安，纵使是那些看起来十分优秀的人。外衣底下是什么，很难知晓。时常会有疑问，是否应该把更多的精力放在思考想要做什么上，而不是把现在的事情做的更好。许多朋友和我交流的时候说感到迷茫。父母辈的年代不一样，朋友间的经历不一样，他们所能提供的帮助也是寥寥。世界上也并没有真正的感同身受，最后的决定和路都要靠自己去摸索。没被教过如何寻找方向，迷茫成为了一件理所应当的事情。同辈间极少见具有逻辑缜密且清晰的未来规划的人，大多都是走一步做一步。也许迷茫一段时间后就有阶段性的答案，在做了一段时间之后又开始迷茫。大抵上成长都是这样曲折前进的。不过令我深以为然的一件事情是，找到属于自己的方向远比在一个方向上一直努力要重要的多。\n\n慢慢学会去观察更全面，立体的人。过去经常性地会将自己置于批判者的角度，对所有不足加以审视，对所有错误发出不屑的声音。却忘记了天赋不一样，对一个事物学习和掌握的能力也不一样。每个人都是一个鲜活的个体，总能在某一个方面展现多彩且卓越的才能。当接触到合适的方向时，相信各位都总能展现出以往所察觉不到的乐趣以及自驱力。一步步来就好，多花点时间思考未来的路总归是有好处的。人生路漫漫，有太多太多的方向，很难找到一条完全相适应的道路。不过，多去尝试总归是没错的。\n\n犯错误是很常见的事情，不是做错一件事情，或者考试没考好，人生就活不下去了，不要太焦虑~~。很多机会在前路等着我们，在机会来的时候把握住就好。人总是会高看自己所做的事情和所在的领域，幸运的是我并没有将自己囿于那一亩三分地中。喜欢上鲁迅先生的作品，就买了第二天的机票跑到绍兴转了几圈。写了很多不着边际的文字做了几期视频，很幸运能分享不同的观点。带着弟弟出门旅游一周，虽然很累（中途还揍了他一顿），他却说下次还想和我出门玩。把鲁迅全集前五本和毛泽东传看完了，解决了不少思想上的苦恼与困惑。一个人跑去新疆和西藏，抵达中国最西边，看到了珠穆朗玛峰，旅途中最幸运的是认识到了很好很好的朋友。从来没举办过活动，第一次举办草坪音乐节，还上了官号，举办的过程中遇到不少困难，演出途中下起了雨，以为大家会散兴离场，却看到人群聚集了起来，心与心之间变得紧密起来，大家更加享受那个美好的夜晚。帮朋友们拍了毕业照，被夸得到了他们想要的毕业照。在成电毕业了，舍不得离开，在这片校园中留下了很多很美好的回忆，认识到很好的朋友们。签证被卡，选择找工作留后路，一周面试五场，在连放大器，加法器是什么都不知道的情况下也找到了不错的工作。在这么多的尝试中，我也会害怕，害怕别人拒绝我，害怕给别人留下不好的印象。但在真正去做了之后却发现，并没有人会一直盯着你，究其原因，无外乎没有利益关系的绑定。所谓的羞耻感也只是作茧自缚。大胆去做，没有什么好失去的，面子并不是一个有价值的东西。周围的目光过一会也就消失了。\n\n人生是一个过程，而不是过关。曾几何时会觉得，成绩搞好就好了，大学考好就好了，研究生申请好了就好了。上班和上学也只有收到offer的那一刻是开心的。路漫漫其修远兮，享受过程是最重要的，极少数的抉择会影响一生，绝大多数决定都殊途同归，不要美化那条没走过的路。努力的结果虽然偶尔会迟到，却不会不来，只是会在未来的某一个时刻提供反馈，所以我从不担心自己的努力会白费，它只是暂时性潜藏起来罢了。从前会为了失去不是很重要的东西苦恼很久，就比如一次作业成绩不理想或者一次考试，一门课考的不高，却不知为何会感到如此心焦意乱，也许是优绩主义带来的弊端。但过段时间发现，他们没有很重要。大抵上都只是过程中的一部分。塞翁失马，焉知非福。发现失去一些东西的同时也总会得到一些什么，能不能找到不一样的东西取决于剖析事物的角度。凡事往好的方向看，兴许能找到意料之外的收获。\n\n这一年里去了不少地方，见到很多人，遇到很多事。以人为镜，我能些许找到一些前进的方向。视野里新鲜的事物冲破了我对这个世界的认识。有句广为人知的话：人生是旷野。在真正看到旷野之前，我以为我的阅历并不算少。但在接触到来自五湖四海四面八方的朋友以及他们的思想之后。发现我还是井底之蛙。但我从不怯场，只是看见世界上还有很多很厉害很优秀的人，并由衷的向每一位对不同领域做出贡献的人进行赞叹。我很感激在旅途中遇到的每一个人，感谢大家为我开拓我那本是独木桥的人生。在一次又一次于外界的交流中，我认识到原来人生会有这么多可以发展的路，每一条路都通往不一样的地方，但愿有一天我也可以找到属于自己的方向。也希望大家能够如此。", "charCount": 1920}, {"id": "从学生到职场人", "title": "从学生到职场人", "cat": "growth", "catLabel": "成长思考", "preview": "从高中生到大学生的思维转变...", "text": "从高中生到大学生的思维转变\n\n我们高中都是有人推着走的，我认为基本不会有什么人迷茫在要不要高考，也不会觉得自己努力学习是没有意义的。有老师，家长指导，也不用去思考学习的意义，只需要知道高考很重要就可以了\n\n但是等我们真正成年之后要对自己的行为开始负责任的时候，就需要开始转变好自己的想法了。\n\n首先第一点就是没人再给你安排好读书的方向和意义了。\n\n读大学我认为有两个点最重要，不是成绩，不是绩点，不是打比赛，不是发论文，这些通通都不算最重要的点（当然你不能挂科）\n\n最重要的是找到自己热爱的一份事业，并愿意为之奋斗。\n\n最重要的是享受生活，找到生命中所涵盖的乐趣。\n\n大学是你人生中最自由的一段时间了，你有很多很多自己的时间去探索，去试错，去看各种各样的人生。工作基本上都很牛马，如果能在学校里面找到一份自己热爱的事业，为之奋斗，那以后的路就不会像其他同学一样迷茫了。实践出真知，很多时候你对于一个事物的认识在没有实践之前都是虚幻的，只有花时间自己去做了才知道真正是怎么一回事。所以趁你们还年轻，多去试错，别怕犯错。\n\n大学空闲时间很多，多搞点钱出去旅游，年轻的时候体力好，多出去走走看看，认识这个世界的多样性，除了客观物质上的区别，更重要的是要认识到人的多样性，世界观，价值观的多样性。很多时候我们说一个人的行为很抽象，其实在说他的行为不符合我们的认知，但是在见得多了之后，我们能从不同的人身上去看到人类的多样性，其实也能慢慢理解，特别是要从他成长的历史背景和家庭环境，这两项尤为重要。旅游中风景看多了会腻，但是跟人的交谈确实不会的，每一个地方都有属于自己的一种独特文化，发现他们，找到他们，去看到世界另一侧不同的声音。\n\n从学生到职场人的思维转变\n\n从你要主动学习，到你要主动学习什么？\n\n从你可以在书本上学习，到真正做到社会实践，你学到了什么？\n\n虽然说是牛马，但是不能放弃自我提升。我在实习的时候其实也就是在上班了啦。在大学的时候你可以还是要花一部分时间 在专业课的学习，也是在一定的框架下面在发展，而且学校里面也会有对应的规矩规则让大家知道以后大概也会有两条路，就业或者升学。当然这个空间显然会比中学大很多，但总体来说你还是在一个框架以及一个潮流下面学。这个潮流指的是同学之间都在学那些东西，打比赛，搞科研，考研，保研，留学，考公，就是说虽然选择很多，但是他的选项是固定 的。通过模仿学习，就总知道大学四年你可以做什么，你能做的东西/选择有哪些？\n\n但是上班不一样了，上班是没有人来主动教你的，没有人会对你的成长负责。因为之前我们周边都是同学，都可以模仿，你可以看得到大家都在做什么，上班就完全没有人对你负责了，能够做的就是自己加油自己去成长。没有一本书没有一个视频能够完全帮你梳理好工作上面该干什么，就是同种岗位不同公司也会有很大的不同，所以到了之后自己学习才是最重要的，抓住工作重点，不懂就问，不要还没开始的时候就觉得自己不行就觉得自己不配，要有高配得感，一定要自己主动去复盘，上班就是会比上学累很多啊啊啊啊啊啊。就是你忙了很久之后还要记录，记录完还要复盘写点东西，超级麻烦。\n\n大部分人还是比较不错的，问问题也是一门学问，怎么问，什么时候问，问什么，一次问几个，这些都是学问啊！！！\n\n第一个，问什么，不要问什么：什么时候吃饭/流程/公司资料。。这些有固定答案的问题都笨笨的。问hr或者负责接待你入职的人就好。\n\n最主要问的是技术方面的，先把学习资料看看，研究明白之后把自己不懂的问题总结成一个文档，把自己的问题写清楚，哪看不懂，哪不会做，自己已经做了什么，分析看不懂的原因，把问问题这个事情的重要性提高起来。因为以前在学校我们问老师问题的时候，老师们是有答案的，但是上班之后，很多东西没有答案，mt也会有没遇到过的东西，他能做的就是跟你一起分析，根据你自己的经验来得出你该做什么，以后怎么做。先做出来自己已经很努力研究这个问题了的态度，但是因为xxx原因，没研究出来，希望和mt一起分析一下以后该怎么做。最好做一个有固定格式问问题的文档，一定要保持记录和积累啊同学们。一定一定要记录自己对于处理这个问题做了什么，查了什么，了解到了什么，学习到了什么，欠缺哪些东西所以要去问。\n\n第二，什么时候问，处理集中问题一般我会选择早上刚上班半小时前以及下午午休结束后问，早上问昨天复盘出来的问题，下午问一些技术问题已经上午工作时出现的一些问题，这样让mt养成习惯，让他知道你是大概什么时候问，问大概什么内容。至于分散问题，我会先尽力去自己网上查资料，至于一些其实无法自己解决的，我会再去问mt。上午10-中午一般都比较忙，下午三点到晚餐也比较忙，挑他们比较空闲的时间再去问，这样不讨人嫌。", "charCount": 1948}, {"id": "台湾游记", "title": "台湾游记", "cat": "travel", "catLabel": "旅行", "preview": "第一天到台湾玩。到了台北101，风景不如小蛮腰。很多韩国旅游团（世界遍地都铺满韩国人）和日本旅游团。逛了宁夏夜市，吃的东西和内地有些许区别，但是不多，小摊的种类也是会有重复性的。最后去吃了一家温州大馄饨，真的很大。...", "text": "台湾游记\n\n1.20.2025\n\n第一天到台湾玩。到了台北101，风景不如小蛮腰。很多韩国旅游团（世界遍地都铺满韩国人）和日本旅游团。逛了宁夏夜市，吃的东西和内地有些许区别，但是不多，小摊的种类也是会有重复性的。最后去吃了一家温州大馄饨，真的很大。\n\n小票叫做载具，地铁叫捷运，有许多用词叫法和大陆不太一样，还蛮有意思的。\n\n台湾人素质很高，对不起和谢谢是时常挂在嘴边的，有时候会说到我不太好意思，也不知道如何该如何回复。地铁上不准吃喝，喝水也不可以，被逮到会被教育的哦，地铁上也不怎么讲话，有时候觉得他们的安静是刻在骨子里的，即使在网吧，大声讲话的人也是没有的，吃惊于他们的坚决不打扰别人的信念。初来乍到，感觉到很多不同，但无法细细说来，只得等到后面几天慢慢体会了。\n\n1.21.2025\n\n台北故宫博物院。震撼惊讶于文物能保存如此之好，大多文物是看不到什么磕碰的地方。运输队大队长在这方面的眼光可真是不错，把国宝级别的文物都搬回来了。明清两朝宫廷文物展出最多，大多数为皇家御用，乾隆，康熙时期的文物居多。造型相当精美，只有中国人才能懂得的优雅与艺术。很多展览品带到内地都能够成为一项镇馆之宝，但是在台北故宫，这样的宝物应接不暇，许多文物只有展台的一侧之地，珍贵文物的摆放密度之高让人觉得它们并不值得重视，可惜于每一件文物没有得到一个单独的展柜，也没有详细的解释和介绍阐述他们那缤纷多彩的故事以及是如何颠沛流离来到这里的经历。在台北故宫的文物都只具其形，不见其魂。样式精美而繁多，却没有一件描述其背后厚重历史与文化脉络的完整篇章，有的仅仅是介绍技艺的高超和繁杂的工序，最吸引人的文物故事却被遗忘了。对我来说，我更感兴趣的是乾隆为什么会对珐琅碗情有独钟，而不是珐琅碗是如何制成的，文物背后的历史才是更具价值的东西。\n\n非常悲哀的是，当看到来故宫的旅游团大多数为日韩人，心里有点堵，心情有点复杂，很少很少有大陆游客。看到他们对待每件文物都是一览而过的时候会想，他们真的看得懂这些文物吗，他们会对这些东西有感情吗，会看到存在于历史书上的文物激动到潸然泪下吗？我不知道，但是我会。始终觉得文物都是有灵魂的，它们的背后承载着历史，而这些历史塑造了现在的社会，现在的社会造就了当下的我们，所以当现在的我看到从前的时候，一眼万年达不到，一眼千年却确确实实发生在了我的眼前。物件是冰冷的，但能洞见历史的温度，一个个鲜活的人出现在了脑海里。我能感受到我和它们是有连接的，原本漂泊不定的灵魂有了锚点，当我知道我从何而来的时候，也就对我该往哪去有了一定的方向。\n\n导览的讲解阿姨是一位台湾老师。她的讲解十分有趣，同时也很有耐心地回答大家地问题。她的措辞会有些许矛盾。有时候会说你们中国，我们台湾，有时候又会说我们中国人才能懂得这种书画之美。那些个老外不识货，中华文化博大精深。想来她对大陆的情感也是复杂的。从她的讲解中，我能感觉的出来她对中国古代文化的热爱，从秦汉到唐宋，再到近代元明清，她都能够侃侃而谈，我也晓得她可能没有去过很多历史上发生这些事件的地方，实际载体对她来说是缺失，接受的教育依赖于大陆文化，却又排斥大陆，实在是十分复杂。但我觉得这并不是她的问题，只是她也不知道如何解决自己的矛盾。\n\n晚上去吃了一家卤肉饭，味道不错，旁边的小哥在劝学弟学妹来大陆玩，说大陆现在发展特别好，臺北是二十年前的上海。感觉那两个小的不是很相信的样子。小哥说了一句很搞笑的话：“只要你跟中国人说两岸一家亲，他们就会颅内高潮。”。听的我差点笑出声，看得出来，两岸人民从小接受的教育不太一样，一边是两岸人民一家亲，另一边呢，我不清楚了。\n\n随手搜了一下台湾历史课本大致资料，发现还是挺有意思的。封建社会时期的历史基本保持一致，没有太大的出入。近代史的资料似乎不大多，似乎没有国共对战的细节内容，出现了三大战役。感觉台湾人民对大陆的感情有些复杂，就像那个导览老师一样，所有追根溯源的东西都存在于大陆。或许他们会觉得自己是中国的正统，却并不知从前的历史现如今发展成什么样了，茫然，又或者可以称之为拧巴。\n\n1.20.2025\n\n第一天到台湾玩。到了台北101，风景不如小蛮腰。很多韩国旅游团（世界遍地都铺满韩国人）和日本旅游团。逛了宁夏夜市，吃的东西和内地有些许区别，但是不多，小摊的种类也是会有重复性的。最后去吃了一家温州大馄饨，真的很大。\n\n小票叫做载具，地铁叫捷运，有许多用词叫法和大陆不太一样，还蛮有意思的。\n\n台湾人素质很高，对不起和谢谢是时常挂在嘴边的，有时候会说到我不太好意思，也不知道如何该如何回复。地铁上不准吃喝，喝水也不可以，被逮到会被教育的哦，地铁上也不怎么讲话，有时候觉得他们的安静是刻在骨子里的，即使在网吧，大声讲话的人也是没有的，吃惊于他们的坚决不打扰别人的信念。初来乍到，感觉到很多不同，但无法细细说来，只得等到后面几天慢慢体会了。\n\n1.21.2025\n\n台北故宫博物院。震撼惊讶于文物能保存如此之好，大多文物是看不到什么磕碰的地方。运输队大队长在这方面的眼光可真是不错，把国宝级别的文物都搬回来了。明清两朝宫廷文物展出最多，大多数为皇家御用，乾隆，康熙时期的文物居多。造型相当精美，只有中国人才能懂得的优雅与艺术。很多展览品带到内地都能够成为一项镇馆之宝，但是在台北故宫，这样的宝物应接不暇，许多文物只有展台的一侧之地，珍贵文物的摆放密度之高让人觉得它们并不值得重视，可惜于每一件文物没有得到一个单独的展柜，也没有详细的解释和介绍阐述他们那缤纷多彩的故事以及是如何颠沛流离来到这里的经历。在台北故宫的文物都只具其形，不见其魂。样式精美而繁多，却没有一件描述其背后厚重历史与文化脉络的完整篇章，有的仅仅是介绍技艺的高超和繁杂的工序，最吸引人的文物故事却被遗忘了。对我来说，我更感兴趣的是乾隆为什么会对珐琅碗情有独钟，而不是珐琅碗是如何制成的，文物背后的历史才是更具价值的东西。\n\n非常悲哀的是，当看到来故宫的旅游团大多数为日韩人，心里有点堵，心情有点复杂，很少很少有大陆游客。看到他们对待每件文物都是一览而过的时候会想，他们真的看得懂这些文物吗，他们会对这些东西有感情吗，会看到存在于历史书上的文物激动到潸然泪下吗？我不知道，但是我会。始终觉得文物都是有灵魂的，它们的背后承载着历史，而这些历史塑造了现在的社会，现在的社会造就了当下的我们，所以当现在的我看到从前的时候，一眼万年达不到，一眼千年却确确实实发生在了我的眼前。物件是冰冷的，但能洞见历史的温度，一个个鲜活的人出现在了脑海里。我能感受到我和它们是有连接的，原本漂泊不定的灵魂有了锚点，当我知道我从何而来的时候，也就对我该往哪去有了一定的方向。\n\n导览的讲解阿姨是一位台湾老师。她的讲解十分有趣，同时也很有耐心地回答大家地问题。她的措辞会有些许矛盾。有时候会说你们中国，我们台湾，有时候又会说我们中国人才能懂得这种书画之美。那些个老外不识货，中华文化博大精深。想来她对大陆的情感也是复杂的。从她的讲解中，我能感觉的出来她对中国古代文化的热爱，从秦汉到唐宋，再到近代元明清，她都能够侃侃而谈，我也晓得她可能没有去过很多历史上发生这些事件的地方，实际载体对她来说是缺失，接受的教育依赖于大陆文化，却又排斥大陆，实在是十分复杂。但我觉得这并不是她的问题，只是她也不知道如何解决自己的矛盾。\n\n晚上去吃了一家卤肉饭，味道不错，旁边的小哥在劝学弟学妹来大陆玩，说大陆现在发展特别好，臺北是二十年前的上海。感觉那两个小的不是很相信的样子。小哥说了一句很搞笑的话：“只要你跟中国人说两岸一家亲，他们就会颅内高潮。”。听的我差点笑出声，看得出来，两岸人民从小接受的教育不太一样，一边是两岸人民一家亲，另一边呢，我不清楚了。\n\n随手搜了一下台湾历史课本大致资料，发现还是挺有意思的。封建社会时期的历史基本保持一致，没有太大的出入。近代史的资料似乎不大多，似乎没有国共对战的细节内容，出现了三大战役。感觉台湾人民对大陆的感情有些复杂，就像那个导览老师一样，所有追根溯源的东西都存在于大陆。或许他们会觉得自己是中国的正统，却并不知从前的历史现如今发展成什么样了，茫然，又或者可以称之为拧巴。\n\n1.23.2025\n\n‘日月潭很深，湖水碧绿。湖中央有个美丽的小岛，叫光华岛，把湖水分成两半。北边像圆圆的太阳，叫日潭；南边像弯弯的月亮，叫月潭。’ 慕名小学课文《日月潭》而来，它也是护照上第四十三页上的风景。\n\n湖水清澈，云淡风轻，阳光映射下的湖面泛起微风。船长跟我们说起光华岛的由来，是老蒋为了光复中华而起（我非常十分难以评价），由于地震，光华岛没了，后面由村民集资重修，改名为拉鲁岛），或许也意味着光华没了吧。其实日月潭的风景并没有给我留下什么很深刻的印象，没看出来哪有太阳和月亮，风景不丑，也算不上绝美。可能只是觉得小时候很喜欢日月潭这篇课文，也是完成自己的一份心愿和执念吧。\n\n日月潭是我童年记忆的一部分，小时候总想着怎么会有这么美丽的湖泊，有机会一定要去看看什么叫做“日月潭好像披上轻纱，周围的景物一片朦胧，就像童话中的仙境。”。课文写的很美，只是我并不觉得日月潭的景色比得上那篇课文在我心中的形象，但我仍觉得不虚此行吧。台湾省都是小山小水，希望他们多来大陆走一走看一看，涨涨见识。\n\n1.24.2025\n\n故宫嘉义南院，再次为文物的繁华所震惊（果然能叫故宫的都不简单哈哈）。亲眼见到了乾隆的三件龙袍，皇后的凤冠，相当之华丽雍容，很符合我对皇室的想象。\n\n文物展览方面和台北故宫差别并不是很大，只是当我看到一个核舟的时候，我愣住了。我想，这是不是核舟记里面的核舟呢？只觉得心里一震，看四周没人，我便仔仔细细的端详起这篇古文里的核舟了。（估计是台湾教材没有核舟记，所以它只被放在文物的一角，看的人也寥寥无几。）“\n\n闭之则右刻“山高月小，水落石出”，左刻“清风徐来，水波不兴”，石青糁之。”我该如何用语言去形容这种共鸣呢？苏轼的赤壁赋用匠人的方式沿承至今，千年的闭环通过教育的方式击中我，使我不得不思考，不得不落泪。我也不知道为什么自己眼眶会变得湿润，或许是因为我对文化的触动。这种感动似乎是来自我们漫长的历史，这件物品就像是历史的传承，存在于社会之中，留在了我们的血液里的。\n\n1.25.2025\n\n到桃园机场了，机场里面东西还蛮好吃的，物价也不贵。\n\n要回纽约了😭😭😭😭😭😭😭😭😭😭，不想走啊啊啊", "charCount": 4267}, {"id": "嫡系文化", "title": "嫡系文化", "cat": "growth", "catLabel": "成长思考", "preview": "为什么职场上一定会有嫡系？...", "text": "为什么职场上一定会有嫡系？\n\nB站视频稿件\n\n预计时长：8-10分钟 ｜ 风格：理性分析型口播\n\n一、开头 Hook（30秒）\n\n各位好。\n\n今天聊一个你在任何一家公司待超过半年，都一定会感受到的东西——嫡系。\n\n你会发现，有些人犯了错领导帮他兜着，有些人立了功领导装没看见。有些人周报写三行字岁月静好，有些人写三页PPT还被说不够主动。\n\n你以为这是不公平，但我今天想说一个可能让你不太舒服的观点：\n\n嫡系文化不是bug，它是feature。\n\n它不是某个坏领导的个人品质问题，它是组织运转的一种底层机制。今天我们不站队，不煽情，就从逻辑上拆一拆——嫡系，到底解决了什么问题，又制造了什么问题。\n\n二、第一部分：嫡系的本质是什么？（2分钟）\n\n我们先定义一下。什么是嫡系？\n\n嫡系不是说谁跟领导关系好、谁一起吃饭多。那叫社交。\n\n嫡系的本质是：一种基于信任的非正式组织协作网络。\n\n你可以把它理解为——在公司正式的组织架构之外，还有一层隐性的\"信任架构\"。领导在这个信任架构里分配信息、分配资源、分配机会。\n\n为什么要搞这么一层东西？公司不是有正式的汇报线、有KPI、有绩效考核吗？\n\n因为正式制度有一个致命的缺陷：它只能考核结果，不能传递信任。\n\n举个例子。你是一个部门负责人，老板让你明天之前交一份关键客户的方案。你手下有两个人：\n\nA 是刚来三个月的新人，简历很漂亮，能力你还在观察；\n\nB 是跟了你两年的老部下，能力一般，但你很清楚他的下限在哪里。\n\n你会把这个活交给谁？\n\n大多数人会选B。不是因为偏心，是因为在高压、高不确定性的环境下，你需要的不是\"最优解\"，而是\"最可控的解\"。\n\n这就是嫡系存在的第一个原因：它是一种风险管理机制。\n\n三、第二部分：嫡系解决了哪些正式制度解决不了的问题？（3分钟）\n\n我们继续深入。嫡系文化之所以在全世界、各行各业都普遍存在，不是因为人性丑陋，而是因为它确实在解决几个真实的组织难题。\n\n1. 信息不对称问题\n\n公司越大，信息损耗越严重。一个决策从高层传到执行层，经过三四级汇报线，意思早就变味了。\n\n嫡系是什么？嫡系是一条信息高速公路。领导可以用更低的沟通成本、更少的信息损耗，把真正重要的意图传递下去。你在正式会议上听到的是\"我们要加强客户服务\"，但嫡系听到的是\"老板觉得客服部门下季度要裁员了，赶紧做好准备\"。\n\n这不是八卦，这是组织运行中的信息效率差。\n\n2. 执行力担保问题\n\n正式制度下，你安排一个活儿给下属，他说\"好的收到\"。但你不知道他是真心要做，还是表面答应回头摸鱼。\n\n你怎么办？你加监控？加日报？加周会？\n\n制度越多，管理成本越高，而且员工会觉得不被信任，反而降低积极性。\n\n但如果对方是你的嫡系呢？你不需要那么多制度保障。因为你们之间有一种隐性的契约——我给你资源和机会，你给我确定性的执行力。这个契约不写在合同里，但双方都心知肚明。\n\n这就像是组织内部的\"免审核通道\"——不是不需要负责，而是彼此已经建立了足够的信用额度。\n\n3. 政治同盟问题-派系问题\n\n这一点大家可能不太愿意承认，但它是事实。\n\n在任何一个超过50人的组织里，都不可能只有一个声音。部门之间有竞争，高管之间有路线分歧，资源是有限的，谁都想多拿一点。\n\n在这种环境下，一个光杆司令是很脆弱的。你需要有人在关键时刻站在你这边，帮你投票、帮你传话、帮你挡刀。\n\n这不是勾心斗角，这是组织博弈中的基本生存策略。\n\n四、第三部分：嫡系文化的代价（2.5分钟）\n\n说完了合理性，我们必须说说代价。因为嫡系文化之所以被人诟病，不是没有道理的。\n\n代价一：能力劣币驱逐良币\n\n当信任成为最重要的晋升标准时，能力就会被稀释。一个能力很强但不擅长搞关系的人，在嫡系文化浓厚的公司里是很吃亏的。\n\n长期来看，这会导致组织能力退化。因为被提拔上来的人不是最能打的，而是最\"可靠\"的。而\"可靠\"在很多时候约等于\"听话\"。\n\n代价二：信息茧房效应\n\n嫡系圈子形成之后，领导接收到的信息会越来越单一。因为圈子里的人都知道领导喜欢听什么，他们会自动过滤掉那些\"不好的消息\"。\n\n这在管理学上叫\"回音室效应\"。你觉得一切都好，其实是因为所有坏消息都被你的嫡系提前过滤掉了。等你发现问题的时候，往往已经来不及了。\n\n代价三：组织信任的系统性崩塌\n\n当圈外人意识到自己永远不可能进入那个圈子，他们会怎么做？\n\n摸鱼、躺平、跳槽。\n\n更糟糕的是，他们不会告诉你为什么。他们会在离职面谈的时候说\"个人发展原因\"，然后在脉脉上写一篇长文，标题叫《在XX公司的三年，我终于明白了什么叫嫡系文化》。\n\n你留下来的人越来越同质化，走掉的人越来越优秀。这个过程是不可逆的。\n\n代价四：继任风险\n\n嫡系网络高度依赖某一个核心节点——就是那个领导本人。一旦这个人离职、调岗或者退休，整个网络就会瞬间瓦解。\n\n你看很多公司换了一个高管之后，下面一整层人集体离职。不是因为他们能力不行，是因为他们的\"信任资产\"清零了。\n\n五、第四部分：那普通人该怎么看待这件事？（1.5分钟）\n\n说了这么多，回到最实际的问题：如果你在一家嫡系文化很重的公司，你应该怎么办？\n\n第一，不要情绪化地否定它。\n\n你可以觉得它不公平，但不要因此认为\"这个世界就是靠关系\"。嫡系文化是组织在信息不完全条件下的一种次优解。它不完美，但它有原因。理解原因比抱怨结果更有用。\n\n第二，区分\"合理的信任网络\"和\"纯粹的裙带关系\"。\n\n一个领导因为跟你合作过、了解你的能力而更信任你，这是合理的。一个领导因为你是他老乡、同学、或者你送了礼而优先照顾你，那是另一回事。前者是效率，后者是腐败。把两者混为一谈，只会让你丧失判断力。\n\n第三，与其抱怨圈子，不如建设自己的\"信用资产\"。\n\n在任何组织里，能力是底牌，信任是杠杆。光有底牌没有杠杆，你翻不了大牌。光有杠杆没有底牌，你撑不了多久。\n\n最聪明的做法是：用能力建立口碑，用口碑换取信任，用信任撬动机会。这个过程急不来，但它比纯粹的\"站队\"可靠得多。\n\n六、结尾（30秒）\n\n所以回到最开始的问题——为什么职场上一定会有嫡系？\n\n因为人类的组织本质上是建立在信任之上的，而信任这个东西，永远不可能被制度完全替代。\n\n嫡系文化是组织进化出来的一种\"信任加速器\"。它让一些事情变快了，但也让另一些事情变糟了。\n\n不要把它妖魔化，也不要把它合理化。\n\n看清它，然后做你该做的选择。\n\n我是XX，我们下期再见。\n\n附：推荐标题和封面文案\n\n标题选项：\n\n1. 「为什么职场一定有嫡系？不是因为领导坏，是因为组织需要」\n\n2. 「嫡系文化不是bug，是feature | 一个你不愿意听的职场真相」\n\n3. 「嫡系到底解决了什么问题？聊聊职场圈子文化的底层逻辑」\n\n封面文案建议：\n\n主标：嫡系不是bug 是feature\n\n副标：看懂了你就不会再抱怨了\n\n推荐标签： #职场 #嫡系文化 #职场真相 #组织管理 #职场干货", "charCount": 2857}, {"id": "实习", "title": "实习", "cat": "personal", "catLabel": "个人感悟", "preview": "2023.7.8-2024.4.1...", "text": "实习\n\n2023.7.8-2024.4.1\n\n我的第一段 也大抵是最后一段实习结束了\n\n公司里一般只有三个人，一个是大老板，一个是二老板，还有一个是我，唯一的一个实习生。两个老板都姓苏，在我和其中一位说话时，我会称呼另外一位为苏师兄。大老板是我们学校的通信工程研究生毕业，毕业后到中兴做高级工程师，再后来回到我们学校当讲师。 发现自己不适应学校的kpi 考核，于是乎自己出来创业。二老板的故事倒不是很清楚，只记得他不是科班出身，本科学的是测绘，后来转到数字ic，职业生涯貌似一直跟着大老板。\n\n23年7月的时候我第一次去公司，师兄说公司虽然小，但是做的东西都是贴近算法类的，属于数字ic中的顶级技术，含金量很高，鉴于本人并没有任何大厂情怀，于是面试完的第二天我就上岗了。\n\n师兄对我很好，每天都会花一个小时来培训我，但他们会称为讨论，我对这个称呼特别开心，因为他把我放在一个平等的地位。讨论的时候师兄们会教我算法的实现步骤，技术文档的撰写以及如何把客户的要求转换成技术人员要做的事情。因为刚开始上手，我有时候问的问题好像显得我特别愚蠢，像是我弟小时候问我6 X 6 等于几一样。他们没有不耐烦，但是也不会教我具体这些bug 怎么解决，而是引导我去查资料，给思路，然后动手解决。\n\n两个师兄都是特别安静的人，做事很集中，不怎么被外界打扰，以至于有时候我两点就下班也不会管我。我很幸运，作为一个比较闹腾的人，最缺的能力莫过于怎么专心地完成一件事情。两位师兄教会了我什么叫做沉淀，什么叫做有逻辑地把一个问题分步解决。 所谓言传身教，很多时候我并没有被手把手教学，但是看着他们工作时 对于处理bug/解决问题的逻辑性以及严密性 却让我收益颇多。一个真正有能力的人是不会被困难影响太多情绪的，处理困难最简单的方法就是一步一步拆分成细小的问题并解决，而绝不是脑子里自己脑补问题有多困难从而自己被自己吓到，以至于连第一步也不敢走出去。 万事开头难，只要做起来就好了，尽力去做，结果如何自有天意。 我是一个无神论者，也相信勤劳致富，但是我也相信人各有命，尽力之后做的事情，无论结果如何，都不会是坏的。\n\n这段时间里，我好像很少和客户接触，甚至于师兄们忙的时候，也不跟他们接触，也就自己静静地做自己的事情。很多时候收获并不是来自于有目的的学习，却是从平凡的日常中管中窥豹培养而成，看着师兄们对于社会的处理方式，我居然学到了很多意料之外的东西。\n\n例如，跳出学生思维，真正和社会接轨。在中国的教育里面，好像什么都要求我们做到最好，能尽早做完就尽早，做不到就会有愧疚感，好似对不起什么一样。这样的社会规训下来，好像培养出的就只是卷的机器。在师兄和客户的拉扯中，我发现了，其实一份六十分的答卷完全够用，八十分超标，一百分那是完全不可能的。对于客户的要求那是能拖就拖，对于做不到的要求那是能做不到就不做。只有这样，才能把甲方的预期降到最低，从而提高自己的谈判地位。从某种意义上来说，这是在教我，人不能太尽责，太尽责的往往都会被替换掉，只有写一点自己能改的bug，在职场上才能被留下来，因为只有你能够解决这个问题，或许也是另外一种提高核心竞争力的方式吧。\n\n再比如，静下心来做事情是一件很厉害很厉害的事情，并且他能帮助我解决诸多问题。绝大多数情况下，我不愿开始行动是因为我把问题想的太复杂，被自己内心所夸大的恐惧所击败。倘若最初的想法是去做，而不是想去做的多好，最后的结果往往都是不差的。问题是好解决的，bug是可以修的，人才是最难解决的。方法总比困难多，bug的产生总是有源头的，人是无常的。 能解决好人的问题，其他的问题并不会很难处理。\n\n算命的先生和我说，我一生都会遇到很多贵人，我不知道是不是真的，但这两位师兄对我的帮助远远确实大于大学期间其他老师对我的教导。 谦虚，专注，认真，负责，情绪稳定。 我学到了很多。 虽然他们常说因为工作忙无法提供给我足够的帮助，我却在日复一日的相处中汲取不同的知识以及待人处事的方法，或许再相见是多年之后，但我会始终铭记这段时光，这段我改变许多的时光。", "charCount": 1682}, {"id": "家庭教育", "title": "家庭教育", "cat": "growth", "catLabel": "成长思考", "preview": "家庭教育（注，本篇极其不严谨，极其主观，写的会比较乱，有时候会有一搭没一搭的，如有赞成一概支持，如有异议概不接受）...", "text": "% 第三篇“想法”\n\n家庭教育（注，本篇极其不严谨，极其主观，写的会比较乱，有时候会有一搭没一搭的，如有赞成一概支持，如有异议概不接受）\n\n（要是回到高中，我语文作文是不是可以提高十分哈哈）\n\n先说观点，我认为一个孩子的成长过程中，父母对孩子最终性格的形成能占到80%及以上的责任，也就是说，我在看来，一个年龄在18岁之前的人的行为逻辑以及性格完全可以由家庭教育推导出来的。性格有很明显缺陷的人，基本家庭都出现裂痕。一个自信强大的人，基本家庭关系都很好。\n\n我目前还相信，先天的基因也会影响性格，我和我弟的成长环境完全不一样，但是我从他身上看到了太多我以前一样的性格。\n\n由于目前我的阅历以及概括能力不足以让我阐述好我目前的观点，所以这次我想举例论证。\n\n先分析几个案例（我，我堂姐，我一个玩的很好的朋友，我发小）\n\n堂姐：恋爱脑，只要别人给她点甜言蜜语她就沦陷\n\n堂姐是我姑姑的女儿，我姑父从她小时候就开始出轨，借了我父母很多钱去所谓创业，其实是去和小三度假。在堂姐小学的时候姑父就很少在家里呆着了，没怎么给过陪伴。在她初中的时候，姑父出轨的事情被发现，于是乎两人离婚。我姑姑是那种死要面子的人，性格极其拧巴，从不和儿女交流，总希望他们自己能懂，甚至有时候要通过我父亲去和她的儿女交流，当我堂姐想要主动和她交流的时候，姑姑每次都找借口逃避。\n\n我时常会想为什么明明在人际交往以及为人处事上面非常老道的姐姐会常常被渣男拿捏 and 受感情的伤（被出轨）。\n\n我想和她从小缺失父爱有很大关系，因为从小缺乏和男性接触，导致很难分辨出男性哪些表现是真爱，哪些表现是情绪，甚至哪些是虚情假意，即如何爱男性以及男性正常的爱女性是怎么一回事，也就是说爱的标准不明确。在这种情况下，很可能会自己去构建一个理想的世界，去疯狂给男朋友加滤镜，要不就是男方犯错误疯狂原谅，要不就是一点小事情就火气冲天。总之就是在亲密关系中极其煎熬和焦虑。然后当一个男生表达出对她的喜爱的时候，她就会倍感珍惜，恨不得付出自己的全部来经营这段感情，也就是我们通常说的缺爱型恋爱脑。很可惜的是，太容易得到的不会被珍惜，一旦心术不正的男生发现自己好像什么都不用付出就可以得到感情的时候，被伤害的也就只有付出真心的人了。\n\n相比于母爱所带来的安全感，如何爱一个人。我认为父爱能够给予人在亲密关系中的是：怎么把握爱一个人的‘度’。在一般情况下，男性会在教育中扮演更加理性的角色，从我个人经验而言，父亲的话总是不多，但是每当我想要越界的时候（例如抢别人东西），他就会狠狠批评我不要乱动别人的东西，诸如此类。男性的教育可能某种程度上是会偏于理性的，基因决定的，如果缺少了这部分的教育，很有可能，孩子要不就是内心防御过当，要不就是给点爱就敞开怀抱，都是需要长大之后很大努力去弥补家庭教育造成的性格缺陷。\n\n但是很遗憾的是，我姐在伴侣上所寻求的安全感，永远不可能代偿她童年的缺失，但愿她能独立且自强吧。\n\n好朋友：很早的时候父母离异，跟父亲。\n\n性格：容易溺死在情绪里，说话随父亲很冲，喜欢犯贱，焦虑\n\n首先我们得明白，通常来说，母亲给孩子的爱是远远大于父亲的，在父爱缺位的情况下，很多时候母亲会充当慈爱和严厉两种角色，但是当母爱缺位的时候，父亲却难把母爱补上，可以说，父亲只能提供一种有条件的爱。\n\n常年生活在有条件爱的时候，多数情况下，当这种人遇到无条件爱的时候，都会非常焦虑，处理方式要不就是发奋图强（因为他们习惯了爱是有条件的，那么他们的付出就是努力向上），要不就是非常多疑，因为他们完全没有遇到无条件的爱，所以他们把这些爱当成有条件的，总想着怎么回报，最后导致很焦虑，因为无以为报，从来没遇到过这种无条件的情况。具体来说就是，有一种 不配得感\n\n我的好朋友，一个母爱缺位的人，他没有一个避风港的，就是当遭受困难和攻击的时候，没有母爱的盾牌挡在他前面，替他遮风挡雨。在极度缺乏安全感的情况下，于是乎他只能分裂出一个坏的自己，可能表面上看起来也很开朗，但是实际上只是对外人的伪装，一个人夜深人静的时候就会非常难熬，不知道把这些创伤告诉谁，也不知道该怎么治愈这些令人伤心的事情。\n\n在他高中的时候谈了很好的人，高三结束的时候分手了，但是他现在还会经常溺死在对前任的想念之中。他说前任对他很好，好到不能再好了，但是他认为前任不懂他，至于到底哪不懂，他也说不出来个所以然。我想可能能从上文中窥见端倪吧。\n\n我的发小：性格极其温和，有种与世无争的感觉\n\n阿姨是非常随和的一个人，虽然有时候比较牙尖，但是对小孩子都是笑呵呵的，从来没发过什么火，当我和发小在他家打游戏打一天的时候，他下班回来第一句话也是，不要玩啦！快吃饭，然后我俩继续打，直到被揍。\n\n叔叔是一个一喝酒就会说胡话的人，讲他那些老掉牙的笑话，也不怕我们都不笑，他自顾自地照样讲，以至于我们都可以说出来他每一次的笑话的笑点在哪了。还特别喜欢吹牛，一吹牛就被我们戳穿，被戳穿了就继续下一个牛。\n\n都说剖析自己的问题是最困难的，我今天也学一下鲁迅先生批判自己呢。\n\n我：自负，自信，对不同于我的观点持极大的质疑态度。\n\n出现原因：外公外婆从小的溺爱，幸福的童年（物质条件不是很好，但是我想要的基本都有），父亲基因的遗传（我爸人很好，就是性子比较急，典型的刀子嘴豆腐心，但对家庭极其负责）。\n\n从小也没遇到什么很大的挫折，初中是自己考上的，高中也是觉得自己考的正常水平，来到了一个力所能及最好的学校，而且这个学校我很喜欢。从普通班到优秀班到特优班也是没付出特别大的努力就靠上去了。高考也是，考的偏低一点，但是很庆幸自己选择了成电，虽然每天都在吐槽它，但是看到yq期间，我们只上过一个月网课的时候，还是蛮幸福的。从小到大，好像没遇到什么让我特别难过的事情。\n\n因此，在上大学之前我完全没有从自己身上找问题的想法，究其原因应该是可以说一路一帆风顺，小困小难就不赘述了。\n\n我深刻地认知到我是幸福的，所以很多时候我不需要依赖别人给的东西或者我付出来获得所为的幸福感，\n\n上了大学之后才慢慢开始觉悟到自己的问题。这其中也爆发了不少家庭矛盾\n\n改变过程：\n\n我父母说，我现在性格不也蛮好的，但是不能只看结果不看过程，这个成长的过程就是我失去了很多朋友，从小到大也没啥朋友，中学的时候基本上就是属于那种狗来嫌，然后我就说其实我很多性格上的事情都是在大学改的，而且大学不在家附近，在外省读书，再加上我自己平时不怎么和家里人交流，所以在我的角度来说，很多事情我经历的都是我父母不知道的。他们就说，他们当年这样教育我，我还不是成长的好好的，但是实际上很多成长的过程都是非常痛苦的，是消耗了我大量的情绪以及时间才对我多年的习惯做出改变，到了他们口中就是说他们的教育是很ok的，我就用我自己的经历去说，我说了很多，包括我高中时候的孤独以及大学是怎么改变的，最后才勉强让我父母稍微让步一下，说大学对我造成的影响蛮大，我感觉我挺难的。因为现在的我深刻地意识到以前的自己是多么的愚蠢/甚至可以说是像个少爷一样，非常的让人讨厌，在大学里面经历了太多让我改变的人和事，所以我担心我弟弟没法像我一样能够说完全认清自己以及改变自己的缺点，准确来说，我感觉没有学校里面的那些同学们，我没法成为今天这样的让我觉得没有说有很大缺点的人（maybe有点自恋），当然我自己脸皮比较厚，他们说归他们说，但是我不听（）。\n\n以至于我现在会如何避免和父母的冲突，他说他的我说我的，他说我今天这个哪哪哪哪没错好，我先赞同他的观点，然后我直接问他今天中午吃什么，一手矛盾转移，非常有用，主打一手已读乱回。\n\n有时候会觉得父母表现爱的方式应该是溺爱/纵容，而不是一昧地为你好（或者说提高你的能力），一昧地让你好更像是完成他们的任务，kpi越高越好。。。\n\n家庭关系，真的非常影响一个人的一生，好的童年治愈人一生，坏的童年需要人治愈一生", "charCount": 3236}, {"id": "鲁迅", "title": "鲁迅读书笔记", "cat": "reading", "catLabel": "读书笔记", "preview": "《坟》杂文集，作者鲁迅。 “造成一座小小的新坟，一面是埋藏，一面是留恋”。...", "text": "鲁迅\n\n《坟》杂文集，作者鲁迅。 “造成一座小小的新坟，一面是埋藏，一面是留恋”。\n\n《坟》的前四篇，是文言文写的，看不懂，故略过，等什么时候文学水平上来了再回头来看\n\n第五篇-我之节烈观（注：当时他她是相同的，文章中‘’他‘’基本指女性，打双引号部分为引用原文）\n\n‘’大约节是丈夫死了，决不再嫁，也不私奔，丈夫死得愈早，家里愈穷，他便节得愈好。烈可是有两种：一种是无论已嫁未嫁，只要丈夫死了，他也跟着自尽；一种是有强暴来污辱他的时候，设法自戕，或者抗拒被杀，都无不可。这也是死得愈惨愈苦，他便烈得愈好。‘’\n\n‘’总而言之：女子死了丈夫，便守着，或者死掉；遇了强暴，便死掉；将这类人物，称赞一通，世道人心便好，中国便得救了。大意只是如此。‘’\n\n鲁迅先生的文字总是平地起惊雷。节烈，在我们的传统思想上是用来表彰一个人，但是仔细想想却发现，这个词是极度双标的，‘节烈’对于男性来说通常指的是思想，立场，但是对于女性来说，却专指身体，贞操。文字不多，却是把男权社会的虚伪以及封建社会的压迫展现的淋漓尽致。社会塑造的生活环境将这种病态的奉献/牺牲美化成女性的高尚品格，通过一种道德绑架的方式，让女性去牺牲自己的自由甚至是生命去得到社会的认可，多么无奈又多么可悲。‘闺女大门不出二门不迈’的社会风气也让女性没有办法去接受教育从而进行思想解放，只能从小接受这种畸形的思想，故很多女性甚至自己都无法察觉到自己遭受了多么大的压迫。\n\n节烈论的逻辑批判\n\n‘‘不节烈（中国称不守节作“失节”，不烈却并无成语，所以只能合称他“不节烈”）的女子如何害了国家？’’\n\n‘’何以救世的责任，全在女子？‘’\n\n‘‘表彰之后，有何效果？’’\n\n鲁迅先生的回答：\n\n第一，\t不节烈的女子怎么害了国家了？ 刀兵、贼盗、水旱、饥荒，哪一条天灾人祸是由不节烈引起的? 政界、军界、学界、商界种种不公都是男性所为，并没有不节烈的女子在内。还有那些拜龙神、迎大王、乱砍森林、不修水利等等绝大多数社会乱象，哪一个是由不节烈女人所为的呢?\n\n第二，\t为什么救世的责任全在女子呢？男女平等，义务略同。为何会有人把朝代更替的原因单纯归结在女人身上？\n\n第三，\t表彰节烈以后有什么效果呢? 鲁迅又将女子分成三类。一，已守节，受了表扬，很好。二，不节烈，被社会唾弃。第三种尚未出嫁或者丈夫仍在，如果这位女性立志极高，很想做节妇、烈妇，可是丈夫长寿，天下太平，那她怎么办?\" 只好饮恨吞声，做一世次等的人物\n\n这个时候的逻辑就非常明显了，没了男性，女性无法得到社会的褒奖。\n\n一把匕首强过三轮大刀，一声嘲笑超过三轮雄辩。鲁迅先生的文字何等讽刺？男权社会把对女性的社会性赞扬建立在了对男性的服务上，并且通过设立道德约束让自己心安理得，再通过从小教育让女性也接受这种思想。\n\n节烈观的荒谬\n\n‘‘节烈是否道德？’’\n\n‘‘多妻主义的男子，有无表彰节烈的资格？’’\n\n鲁迅先生引出了文章里的一个重要观点， “道德这事必须普遍，人人应做，人人能行，又于自他两利，才有存在的价值。”\n\n爱情也是，忠于爱情，只爱一个人很高尚，但是如果爱上第二个人就得自杀，那不就有点可怕？很明显，这并不道德。\n\n不准妻子喜欢上别人，却容许自己多妻。何谈平等呢？又何谈有资格评价别人是否节烈呢？\n\n因此节烈观是否合乎常理，不言而喻\n\n‘’即如失节一事，岂不知道必须男女两性，才能实现。他却专责女性；至于破人节操的男子，以及造成不烈的暴徒，便都含糊过去。‘’\n\n和朋友谈论了为什么在女性被迫害的电影情节中，导演都喜欢拍女性视角，大抵是因为他们想通过女性的可怜反衬出施暴者的可怕吧。但是为什么不能把视角转移给施暴者呢？会不会这种镜头不能让观众知道施暴者的无情，冷血，暴力从而抵制这种行为，只能让他们记得女性是好被欺负的？我之前看这种镜头都有种不适感，直到和朋友聊起来我才发现原来是这个原因。\n\n我依据以上的事实和理由，要断定节烈这事是：极难，极苦，不愿身受，然而不利自他，无益社会国家，于人生将来又毫无意义的行为，现在已经失了存在的生命和价值。\n\n临了还有一层疑问：\n\n节烈这事，现代既然失了存在的生命和价值；节烈的女人，岂非白苦一番么？可以答他说：还有哀悼的价值。他们是可怜人；不幸上了历史和数目的无意识的圈套，做了无主名的牺牲。可以开一个追悼大会。\n\n我们追悼了过去的人，还要发愿：要自己和别人，都纯洁聪明勇猛向上。要除去虚伪的脸谱。要除去世上害己害人的昏迷和强暴。\n\n我们追悼了过去的人，还要发愿：要除去于人生毫无意义的苦痛。要除去制造并赏玩别人苦痛的昏迷和强暴。\n\n我们还要发愿：要人类都受正当的幸福。\n\n一九一八年七月。\n\n百年前的思想放到现在仍是振聋发聩经久不衰的，或许男女平权和自由平等是人类社会需要一直追求的东西。非常推荐大家看原文，鲁迅先生的论证极其精彩。语言讽刺意味极深，让我自己看了自省了很久，或许我身上也还有\n\n非常推荐大家看原文，鲁迅先生的论证极其精彩。语言讽刺意味极深，让我自己看了自省了很久，或许我身上也还有旧时代的影子，毕竟抗日战争也才结束七十多年，但愿我能剔除这些糟粕。\n\n为什么我看这篇文章的时候，我会特别有感触呢，原因有二：\n\n第一，我之前和女性朋友聊天的时候会聊到女性视角下的社会，就是社会上对于女生长久以来的传统观念塑造（例如早结婚早生小孩，要以家庭为重）/职场歧视等等，不胜枚举，被社会不友好的对待。当在我经历了一些事情之后，我发现这些东西很多时候都是被公众所默认的，人们已经习以为常地这样看待女性，或者说人们害怕被其他人因为不认同这些观点而被排挤，于是委身于不公环境之下，不去发声，不去作为。但是现代教育真的是给男女平等做了很大贡献，每个人都有机会去接受教育，进行思想解放，所以可以看到越来越多的女性朋友有独立思考的能力。后面这里不知道该如何表达了，再说可能会有点爹味，不做展开，我想表达的意思我认为是到位了的。\n\n第二，过年期间和我老妈聊天的时候，我发现她默认女生就应该早结婚早生小孩，做老师/医生/公务员等稳定的工作，很明显的传统女性思想，但是她自己又是一位比较有事业心 and 事业有成的女性，因此她和我聊这个话题的时候其实是充满矛盾感的。举个例子，过年期间，她一边对我堂姐说她应该回老家省会发展，因为众所周知的原因（离家近，家里人能衬托等）。另外一方面她又会觉得年轻人应该要有自己的想法和事业。她说自己有时代局限性，她所接受的教育可能跟不上现在的时代，所以她认为我堂姐是应该在外面闯荡的，不应该过一眼能够望到头的生活。导致她对我说的话很多都会自相矛盾，一边说我堂姐不懂事，不听我姑姑的话回家发展。一边给予我堂姐经济支援鼓励她发展自己的事业。在这个事情中，我能完全感受到我妈的矛盾感以及教育给人类带来的思想解放以及社会的进步。太震撼了，太震撼了。以我目前的文字水平很难复述出我当时的感受，只觉得教育的重要性以及女性独立思想的觉醒是这么的有意义。\n\n最后：\n\n我以前无法理解极端女权，但是现在我的观点是，没有极端女权也不会有平权。正如鲁迅先生所说，中国人的性格是调和的，你要把天花板打破他们才肯开窗。", "charCount": 2933}, {"id": "鲁迅2", "title": "鲁迅读书笔记（续）", "cat": "reading", "catLabel": "读书笔记", "preview": "我是鲁迅先生的忠实拥趸。为什么呢？在2023年十一月份的时候，我对人生的思考陷入瓶颈，囿于想得太多做得太少，对于很多事情也缺乏经验，我无法解决所有问题，同时我发现自己思考的很多东西无法从周围人中得到答案。于是我往不同方向追索答案，寥寥人物/...", "text": "鲁迅2\n\n% 第四篇\n\n我是鲁迅先生的忠实拥趸。为什么呢？在2023年十一月份的时候，我对人生的思考陷入瓶颈，囿于想得太多做得太少，对于很多事情也缺乏经验，我无法解决所有问题，同时我发现自己思考的很多东西无法从周围人中得到答案。于是我往不同方向追索答案，寥寥人物/观点能助我解惑，于是我继续迷茫地寻找，期待能有一天，有一个人能解决我所有的迷惑。这些迷惑包括但不限于，女权思想，中国社会的底层逻辑，旧社会对现在社会的影响，诸如此类。\n\n一次偶然的机会，我下载了微信读书（真不是广），想看看有没有什么新出的书值得一看，翻来覆去，并没有让人耳目一新的书。于是我想找一些老书看看，毕竟能从滔滔历史中沉淀下来的文字，总有他依旧繁盛的道理，历史总是重复的，或许我现在的疑惑从前的人也经历过并且解决了呢，我想从最最最有名的文学家的作品里找答案。于是我脑海中浮现了一个名字：鲁迅先生。到现在已经看了鲁迅全集前三本了，收获颇多。\n\n一别与网络上对于鲁迅先生的评价，我发现他的文章并不激进，甚至可以说有点过于谨慎了。鲁迅先生书中总是说着自己学识浅薄，不愿被称为学者或者教授，单单称自己为：‘舞文弄墨的人，不值一提。如果能对现在的年轻人有一点帮助，那就足够了。’ 知道的越多，不知道的也就越多。一个真正学识渊博的人，一定是一个谦虚的人，不过度发表自己的言论，因为时刻保持着对自己观点的严谨性。作为一名工科生，我超爱这种对自己言论负责的思想，有因有果，阐述的观点有依据有论点有论证。（再次感慨，现在回高中，作文应该不止每次都只有四十出头的分数了吧）\n\n鲁迅先生的文风是幽默辛辣的。‘我不常写书，因为我前几年写的道理放在现在依然是有用的，是痛击‘学者’，‘教授’们的。我相信我的道理还能用十年，二十年。但如果我现在的道理还能用一百年，两百年，那中国大抵是完蛋了。’一百年过去了，很多道理用不上了，但是还有很多道理却依然是适用的或许那些东西深深地刻在了中国民族的灵魂里，我不知道，也不知道该说这些东西是好是坏，对于不同情况下，每个人对这些东西的评判也不一样罢。\n\n这些东西有哪些呢，我来举几个例子：\n\n捧杀。或者说，用一种恭维的方式来达到阴暗的目的。‘如果来信开首称我为什么 ‘学者’，‘文学家’，则下面一定是谩骂，我才明白这等称号，乃是他们所公设的巧计，是精神的枷锁，故意推荐给你定为‘与众不同’，借此来束缚你的言动，是你与他们的老生活上失去危险性的。’ 捧得越高，摔得越狠。又有多少人是从空中阁楼上摔死的呢，我不知道，但是从周围经验来说，不在少数。当一个人获得较大成就的时候，总是有人喜欢恭维来恭维去，把本不属于他人的赞美强加在成功者头上（并非正常的祝贺，我是指一种越界的恭维）。我之前也会这样做（我是模仿怪，又模仿鲁迅先生批判自己），现在回想起来，大概是出于一种阴暗扭曲的心理，把别人捧得高高的，又期待别人赶紧摔下来（好吧我就是这么阴暗的人啊啊啊），以一种扭曲的心态恭维别人，希望他们快速走上高坛而不在意地基，最后狠狠掉下来。正如鲁迅先生所说，故意将他人定做与众不同，借此束缚他人的言动。当时看得我特别羞愧，原来自己的思想有时候是如此阴暗。到现在我的想法是，别人得到的也并不是我所失去的，所以我不需要因为别人的成就产生嫉妒的情绪。我是一个理想主义者，我的想法是把蛋糕做大而非把蛋糕都抢走，如果把能抢走多少蛋糕就抢走多少蛋糕的人称作卷，私以为我不会做一个卷的人，我想做那个把蛋糕做大，实现社会分配合理化的人。\n\n对职场的理解：\n\n‘中国的官兵就常在实做的，他们总不肯扫清土匪或扑灭敌人，因为这么一来，就要不被重视，甚至于因失其用处而被裁汰。我想，如果能将这方法推广应用，我大概也总可望成为所谓“指导青年”的“前辈”的罢，但现下也还未决心实践，正在研究而且推敲’ 说人话就是，做事不能做太快也不能做太好，要做那种离开了你就不行的工作。虽然还未正式踏入职场，但在实习的这半年多时间里，也见到不少类似的情况。兢兢业业做到100分的项目是不行的，无法长久，因为做到100分的项目是可以由其他人替代操控的。而缝缝补补做到80分的项目才能长久，因为离开这些创造项目的人，项目无法生存下去。分析得很透彻，真的很透彻，有种被看穿的感觉。\n\n鲁迅先生虽然不是共产党人，但是我坚信他的精神却是贴合共产党人的。\n\n因为他是是和人民大众走在统一战线的。‘我是不薄庸俗的，也自甘庸俗的。’ 古来今往，多少文人想把自己和普罗大众划清界限，以显示自己的清高或者高雅。鲁迅先生不同，从不将自己束之高阁，提倡白话文，为妇女发声，为孩童发声（力争减少中国式家长/教育的弊端），诸如此类。可能为弱势群体发声是一件对名人来说再正常不过的事情。但是，绝大部分发声都在阐述弱势群体的弱势上面浅尝辄止，用苦难或者困境来博得同情和可怜。鲁迅先生不同，他从不把说弱势群体多可怜，他是把他们当成一个社会群体来看的，或许可以称之为尊重他们。鲁迅先生用大量篇幅来分析弱势群体之所以弱势的原因，从根本上找出现象出现的底层原因。更让我敬佩的是，他能够提出行之有效的解决方法： 白话文是解决文盲问题，提高大众素养的最佳途径；妇女应该能尽可能多得参加教育就多去参加教育；孩童太难了，因为：“勇者愤怒，抽刃向更强者；怯者愤怒，却抽刃向更弱者。不可救药的民族中，一定有很多英雄，专向孩子们瞪眼。这些孬头们！”孩童们或许在成年之后都要一直遭受原生家庭带来的苦难，需要自我的觉醒才能真正摆脱冷气向上走。觉醒从哪来呢，大抵每个人都不一样吧，我也不清楚了。\n\n鲁迅先生的文章中所透露出的智慧和谦逊带我走出迷茫期。从他的文字中，我清楚地看到了中国社会的本质，中国人的国民性以及中国人的行为逻辑。他深刻剖析了中国人情社会的底层逻辑（我不愿称之为旧社会，大抵是因为我现在看到的现象和当时无二），让我在对处理不同人际关系和事情的时候，都能从中发现一二来帮助我自己待人接物。让我初步有了一套自己为人处事的方法论，并且能够了解群体性行为的由来，并且预判群体性行为将如何发生。可能我的表达不甚清晰明了，但我想我总归是有一些收获的。\n\n借用一位朋友的话：要么孤独，要么庸俗。我似乎在走向一条通往“孤独”的路上，但是这路上的风景却额外让我着迷。不愿将这份孤独称之为高雅或者其他什么高级词汇，例如曲高和寡/高处不胜寒，诸如此类都无法代替孤独这个词，因为这条路上，不会有两个人走相同的路。但我也愿同鲁迅先生一样，自甘庸俗，所谓出世-入世-出世，这是一个反复曲折的螺旋上升的过程。因此，庸俗是也是我未来会探索的道路，我也很期待接下来看鲁迅先生的作品能给我带来一些什么其他新的东西。\n\n我很期待。", "charCount": 2735}];

const list = document.getElementById('articleList');
ARTICLES.forEach((a, i) => {
  const item = document.createElement('div');
  item.className = 'article-item';
  item.dataset.cat = a.cat;
  item.dataset.idx = i;
  item.innerHTML = `
    <div>
      <div class="item-cat">${a.catLabel}</div>
      <div class="item-title">${a.title}</div>
      <div class="item-preview">${a.preview}</div>
    </div>
    <div class="item-meta">${a.charCount} 字 <span class="item-arrow">→</span></div>
  `;
  item.addEventListener('click', () => openReader(i));
  list.appendChild(item);
});

const obs = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      const delay = Array.from(list.children).indexOf(e.target) * 60;
      setTimeout(() => e.target.classList.add('visible'), delay);
      obs.unobserve(e.target);
    }
  });
}, { threshold: 0.05 });
document.querySelectorAll('.article-item').forEach(el => obs.observe(el));

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const cat = btn.dataset.cat;
    document.querySelectorAll('.article-item').forEach(item => {
      const show = cat === 'all' || item.dataset.cat === cat;
      item.style.display = show ? '' : 'none';
      if (show && !item.classList.contains('visible')) {
        setTimeout(() => item.classList.add('visible'), 30);
      }
    });
  });
});

const reader = document.getElementById('reader');
function openReader(idx) {
  const a = ARTICLES[idx];
  document.getElementById('readerCat').textContent = a.catLabel;
  document.getElementById('readerTitle').textContent = a.title;
  const paras = a.text.split('\n\n').filter(p => p.trim());
  document.getElementById('readerBody').innerHTML = paras.map(p =>
    '<p>' + p.replace(/\n/g, '<br>') + '</p>'
  ).join('');
  reader.classList.add('open');
  document.body.style.overflow = 'hidden';
  reader.scrollTop = 0;
}
function closeReader() {
  reader.classList.remove('open');
  document.body.style.overflow = '';
}
document.getElementById('readerClose').addEventListener('click', closeReader);
reader.addEventListener('click', e => { if (e.target === reader) closeReader() });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeReader() });

// Float nav: appear after scrolling past hero
const floatNav = document.getElementById('floatNav');
window.addEventListener('scroll', () => {
  floatNav.classList.toggle('visible', window.scrollY > 260);
}, { passive: true });
</script>
